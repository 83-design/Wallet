<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexUSDT Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0a0f1e; color: white; -webkit-tap-highlight-color: transparent; overflow-x: hidden; font-family: sans-serif; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 50; backdrop-filter: blur(10px); align-items: center; justify-content: center; }
        .active-modal { display: flex; }
        .token-row { background: rgba(255,255,255,0.03); border-radius: 1.5rem; transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); }
        .token-row:active { background: rgba(255,255,255,0.08); transform: scale(0.98); }
        @keyframes pulse-green { 0% { color: #22c55e; } 50% { color: #4ade80; } 100% { color: #22c55e; } }
        .live-price { animation: pulse-green 2s infinite; }
    </style>
</head>
<body class="p-4">

    <div class="flex justify-between items-center mb-8 pt-2">
        <div class="flex items-center gap-3">
            <div id="brandLogo" class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-500/20">
                <i data-lucide="shield-check" class="w-6 h-6 text-white"></i>
            </div>
            <span class="font-bold text-xl tracking-tight">NexUSDT</span>
        </div>
        <button onclick="toggleModal('settingsModal')" class="p-2 bg-white/5 rounded-full border border-white/5">
            <i data-lucide="sliders-horizontal" class="text-white w-5 h-5"></i>
        </button>
    </div>

    <div id="mainCard" class="relative overflow-hidden rounded-[2.5rem] p-8 mb-6 border border-white/5 bg-gradient-to-br from-[#161c2d] to-[#0a0f1e]">
        <p class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-2 opacity-60">Ваш баланс</p>
        <div class="flex items-baseline gap-2">
            <h1 id="mainBalanceDisplay" class="text-5xl font-black tracking-tighter">0.00</h1>
            <span id="mainCurrencyLabel" class="text-blue-500 font-black text-xl uppercase">USDT</span>
        </div>
        <div class="mt-4 flex items-center gap-2">
            <p id="convertedBalance" class="text-gray-400 font-medium text-lg">≈ 0.00 USD</p>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-10">
        <button onclick="toggleModal('depositModal')" class="flex items-center gap-3 bg-white text-black py-5 px-6 rounded-3xl active:scale-95 transition font-bold">
            <i data-lucide="plus-circle" class="w-6 h-6"></i> Пополнить
        </button>
        <button onclick="toggleModal('withdrawModal')" class="flex items-center gap-3 bg-[#161c2d] text-white py-5 px-6 rounded-3xl border border-white/5 active:scale-95 transition font-bold">
            <i data-lucide="arrow-up-right" class="w-6 h-6 text-blue-500"></i> Вывести
        </button>
    </div>

    <div class="space-y-4">
        <div class="flex justify-between items-end px-2">
            <p class="text-[10px] uppercase font-black text-gray-500 tracking-[0.2em]">Криптоактивы</p>
            <p class="text-[10px] text-green-500 font-bold live-price">LIVE MARKET</p>
        </div>
        
        <div class="token-row p-5 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" class="w-12 h-12 rounded-full" alt="USDT">
                <div>
                    <p class="font-black text-lg">Tether</p>
                    <p class="text-xs text-gray-500 font-bold uppercase tracking-tighter">USDT • TON Network</p>
                </div>
            </div>
            <div class="text-right">
                <p id="listBalanceDisplay" class="font-black text-lg">0.00</p>
                <p id="currentRateDisplay" class="text-[11px] font-bold text-blue-400">Загрузка курса...</p>
            </div>
        </div>
    </div>

    <div id="depositModal" class="modal">
        <div class="bg-[#161c2d] w-[90%] rounded-[3rem] p-8 border border-white/10 relative">
            <h2 class="text-2xl font-black mb-2">Пополнение</h2>
            <p class="text-orange-500 text-[10px] font-black uppercase mb-6">Внимание: Только сеть TON</p>
            <div class="bg-white p-4 rounded-[2rem] mb-6 flex justify-center shadow-2xl">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=UQCE0zJ-0FFfY0nPUUkVIPUVBhm3K9O0ugJaErpH1uNTa-T9" alt="QR">
            </div>
            <p class="text-[10px] text-gray-500 font-bold mb-2 uppercase text-center">Ваш адрес</p>
            <div class="bg-[#0a0f1e] p-4 rounded-2xl break-all text-[10px] font-mono text-blue-400 border border-white/5 mb-6 text-center">
                UQCE0zJ-0FFfY0nPUUkVIPUVBhm3K9O0ugJaErpH1uNTa-T9
            </div>
            <button onclick="copyAddr()" class="w-full py-4 bg-blue-600 rounded-2xl font-black text-sm uppercase tracking-widest shadow-lg shadow-blue-600/20 active:scale-95 transition mb-2">Копировать</button>
            <button onclick="toggleModal('depositModal')" class="w-full py-3 text-gray-500 font-bold text-xs">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="bg-[#161c2d] w-[90%] rounded-[3rem] p-8 border border-white/10">
            <h2 class="text-2xl font-black mb-8">Настройки</h2>
            
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-3 block italic">Примерить баланс</label>
                    <input type="number" id="inputBalance" placeholder="Сумма USDT" class="w-full p-4 bg-[#0a0f1e] rounded-2xl border border-white/5 outline-none font-bold text-blue-400">
                </div>

                <div>
                    <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-3 block italic">Валюта</label>
                    <select id="selectCurrency" class="w-full p-4 bg-[#0a0f1e] rounded-2xl border border-white/5 outline-none font-bold">
                        <option value="USD">USD ($) — Доллары</option>
                        <option value="RUB">RUB (₽) — Рубли</option>
                        <option value="UAH">UAH (₴) — Гривны</option>
                    </select>
                </div>

                <div>
                    <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-3 block italic">Цвет бренда</label>
                    <div class="flex justify-between bg-[#0a0f1e] p-4 rounded-2xl">
                        <div onclick="updateTheme('#2563eb')" class="w-8 h-8 rounded-full bg-blue-600 ring-2 ring-white"></div>
                        <div onclick="updateTheme('#ef4444')" class="w-8 h-8 rounded-full bg-red-500"></div>
                        <div onclick="updateTheme('#22c55e')" class="w-8 h-8 rounded-full bg-green-500"></div>
                        <div onclick="updateTheme('#f59e0b')" class="w-8 h-8 rounded-full bg-orange-500"></div>
                        <div onclick="updateTheme('#ffffff')" class="w-8 h-8 rounded-full bg-white"></div>
                    </div>
                </div>
            </div>

            <button onclick="saveAndClose()" class="w-full mt-10 py-5 bg-white text-black rounded-2xl font-black uppercase tracking-widest active:scale-95 transition">Сохранить</button>
        </div>
    </div>

    <div id="withdrawModal" class="modal">
        <div class="bg-[#161c2d] w-[90%] rounded-[3rem] p-8 border border-white/10">
            <h2 class="text-2xl font-black mb-6 tracking-tighter text-blue-500">Вывод средств</h2>
            <div class="space-y-4">
                <input type="text" placeholder="Адрес получателя (TON)" class="w-full p-4 bg-[#0a0f1e] rounded-2xl border border-white/5 outline-none">
                <input type="number" placeholder="Количество USDT" class="w-full p-4 bg-[#0a0f1e] rounded-2xl border border-white/5 outline-none">
                <button onclick="alert('Ошибка: Недостаточно USDT на балансе для оплаты комиссии сети!')" class="w-full py-4 bg-blue-600 rounded-2xl font-black uppercase">Вывести сейчас</button>
                <button onclick="toggleModal('withdrawModal')" class="w-full py-2 text-gray-500 font-bold">ОТМЕНА</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Данные приложения
        let userBalanceUSDT = 0;
        let selectedCurrency = 'USD';
        let marketRates = { USD: 1, RUB: 91.5, UAH: 38.2 };
        let symbols = { USD: '$', RUB: '₽', UAH: '₴' };

        // Имитация живого курса (меняется каждые 5 секунд)
        function updateMarketPrice() {
            const basePrice = marketRates[selectedCurrency];
            const randomFluc = (Math.random() * 0.4 - 0.2); // небольшое колебание
            const finalPrice = (basePrice + randomFluc).toFixed(2);
            
            document.getElementById('currentRateDisplay').innerText = `1 USDT ≈ ${finalPrice} ${selectedCurrency}`;
            
            // Если баланс не нулевой, обновляем и вторую строчку
            const conv = (userBalanceUSDT * (basePrice + randomFluc)).toLocaleString();
            document.getElementById('convertedBalance').innerText = `≈ ${conv} ${selectedCurrency}`;
        }

        setInterval(updateMarketPrice, 5000);
        updateMarketPrice();

        function toggleModal(id) {
            document.getElementById(id).classList.toggle('active-modal');
        }

        function copyAddr() {
            navigator.clipboard.writeText("UQCE0zJ-0FFfY0nPUUkVIPUVBhm3K9O0ugJaErpH1uNTa-T9");
            alert("Адрес скопирован в буфер!");
        }

        function updateTheme(color) {
            document.getElementById('brandLogo').style.backgroundColor = color;
            document.querySelectorAll('.bg-blue-600').forEach(el => el.style.backgroundColor = color);
            document.getElementById('mainCurrencyLabel').style.color = color;
            // Обновить визуальный выбор (кольцо)
            const dots = document.querySelectorAll('.rounded-full.w-8');
            dots.forEach(d => d.classList.remove('ring-2', 'ring-white'));
            event.target.classList.add('ring-2', 'ring-white');
        }

        function saveAndClose() {
            const newBal = document.getElementById('inputBalance').value;
            selectedCurrency = document.getElementById('selectCurrency').value;

            if (newBal !== "") {
                userBalanceUSDT = parseFloat(newBal);
                document.getElementById('mainBalanceDisplay').innerText = userBalanceUSDT.toLocaleString();
                document.getElementById('listBalanceDisplay').innerText = userBalanceUSDT.toLocaleString();
            }

            updateMarketPrice(); // Сразу пересчитать валюту
            toggleModal('settingsModal');
        }
    </script>
</body>
</html>
