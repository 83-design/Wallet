<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexUSDT Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0a0f1e; color: white; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 50; backdrop-filter: blur(5px); }
        .active-modal { display: flex; }
        .accent-bg { transition: background-color 0.3s; }
        .token-row { background: rgba(255,255,255,0.03); border-radius: 1.5rem; transition: 0.2s; }
    </style>
</head>
<body class="p-4 font-sans">

    <div class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-2">
            <div id="brandLogo" class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center shadow-lg">
                <i data-lucide="wallet" class="w-5 h-5 text-white"></i>
            </div>
            <span class="font-bold text-xl tracking-tight">NexUSDT</span>
        </div>
        <button onclick="toggleModal('settingsModal')" class="p-2 hover:bg-white/10 rounded-full transition">
            <i data-lucide="settings" class="text-gray-400 w-6 h-6"></i>
        </button>
    </div>

    <div id="mainCard" class="relative overflow-hidden rounded-[2.5rem] p-8 mb-6 border border-white/5 bg-[#161c2d]">
        <p class="text-gray-400 text-sm mb-1">Общий баланс</p>
        <div class="flex items-baseline gap-2">
            <h1 id="balanceValue" class="text-4xl font-black tracking-tighter">0.00</h1>
            <span id="currencyLabel" class="text-blue-400 font-bold uppercase">USDT</span>
        </div>
        <p id="secondaryBalance" class="text-gray-500 text-sm mt-1">≈ 0.00 USD</p>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <button onclick="toggleModal('depositModal')" class="flex flex-col items-center justify-center bg-[#161c2d] py-5 rounded-[2rem] border border-white/5 active:scale-95 transition">
            <div class="bg-green-500/20 p-2 rounded-full mb-2 text-green-500"><i data-lucide="arrow-down-left"></i></div>
            <span class="text-sm font-bold">Пополнить</span>
        </button>
        <button onclick="toggleModal('withdrawModal')" class="flex flex-col items-center justify-center bg-[#161c2d] py-5 rounded-[2rem] border border-white/5 active:scale-95 transition">
            <div class="bg-blue-500/20 p-2 rounded-full mb-2 text-blue-500"><i data-lucide="arrow-up-right"></i></div>
            <span class="text-sm font-bold">Вывести</span>
        </button>
    </div>

    <div class="space-y-3">
        <p class="text-[10px] uppercase font-black text-gray-500 tracking-[0.2em] ml-2">Активы</p>
        <div class="token-row p-4 flex items-center justify-between border border-white/5">
            <div class="flex items-center gap-4">
                <div class="w-11 h-11 bg-[#26a17b] rounded-full flex items-center justify-center font-bold text-white shadow-lg shadow-green-900/20">T</div>
                <div>
                    <p class="font-bold">Tether USDT</p>
                    <p class="text-xs text-gray-500 font-medium">Network: TON</p>
                </div>
            </div>
            <div class="text-right">
                <p id="listBalance" class="font-bold">0.00</p>
                <p class="text-[10px] text-green-500 font-bold">+$0.01 (0.01%)</p>
            </div>
        </div>
    </div>

    <div id="depositModal" class="modal items-end sm:items-center justify-center">
        <div class="bg-[#161c2d] w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 animate-slide-up">
            <div class="w-12 h-1.5 bg-white/10 rounded-full mx-auto mb-6 sm:hidden"></div>
            <h2 class="text-2xl font-black mb-2">Пополнение</h2>
            <p class="text-orange-400 text-xs font-bold mb-6 flex items-center gap-1">
                <i data-lucide="alert-triangle" class="w-3 h-3"></i> СЕТЬ ТОЛЬКО TON (BEP-20 / ERC-20 НЕ ПРИНИМАЮТСЯ)
            </p>
            <div class="bg-white p-4 rounded-3xl mb-6 flex justify-center">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=UQCE0zJ-0FFfY0nPUUkVIPUVBhm3K9O0ugJaErpH1uNTa-T9" alt="QR Code">
            </div>
            <div class="bg-[#0a0f1e] p-4 rounded-2xl break-all text-center text-xs font-mono text-blue-300 border border-white/10 mb-6">
                UQCE0zJ-0FFfY0nPUUkVIPUVBhm3K9O0ugJaErpH1uNTa-T9
            </div>
            <button onclick="copyAddr()" class="w-full py-4 bg-blue-600 rounded-2xl font-bold mb-3 active:scale-95 transition">Копировать адрес</button>
            <button onclick="toggleModal('depositModal')" class="w-full py-4 text-gray-500 font-bold">Закрыть</button>
        </div>
    </div>

    <div id="withdrawModal" class="modal items-end sm:items-center justify-center">
        <div class="bg-[#161c2d] w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8">
            <h2 class="text-2xl font-black mb-6">Вывод USDT</h2>
            <div class="space-y-4 mb-8">
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-2">Сеть</label>
                    <div class="w-full p-4 bg-[#0a0f1e] rounded-2xl border border-blue-500/50 text-blue-400 font-bold">TON Network</div>
                </div>
                <input type="text" placeholder="Адрес получателя" class="w-full p-4 bg-[#0a0f1e] rounded-2xl border border-white/5 focus:border-blue-600 outline-none transition">
                <input type="number" placeholder="Сумма" class="w-full p-4 bg-[#0a0f1e] rounded-2xl border border-white/5 focus:border-blue-600 outline-none transition">
            </div>
            <button onclick="alert('Недостаточно средств')" class="w-full py-4 bg-blue-600 rounded-2xl font-bold mb-3 active:scale-95 transition">Подтвердить вывод</button>
            <button onclick="toggleModal('withdrawModal')" class="w-full py-4 text-gray-500 font-bold">Отмена</button>
        </div>
    </div>

    <div id="settingsModal" class="modal items-center justify-center">
        <div class="bg-[#161c2d] w-[90%] max-w-md rounded-[2.5rem] p-8 border border-white/10">
            <h2 class="text-xl font-black mb-6">Настройки</h2>
            
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase mb-2 block">Симуляция баланса</label>
                    <input type="number" id="fakeInp" placeholder="Введите сумму" class="w-full p-3 bg-[#0a0f1e] rounded-xl border border-white/5 outline-none mb-2">
                    <button onclick="applySettings()" class="w-full bg-white text-black py-2 rounded-xl font-bold text-sm">Применить</button>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase mb-2 block">Валюта отображения</label>
                    <select id="currSel" class="w-full p-3 bg-[#0a0f1e] rounded-xl border border-white/5 outline-none text-sm">
                        <option value="RUB">RUB (₽)</option>
                        <option value="UAH">UAH (₴)</option>
                        <option value="USD">USD ($)</option>
                    </select>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase mb-2 block">Цвет интерфейса</label>
                    <div class="flex gap-4">
                        <div onclick="setTheme('#2563eb')" class="w-8 h-8 rounded-full bg-blue-600 cursor-pointer border-2 border-white"></div>
                        <div onclick="setTheme('#dc2626')" class="w-8 h-8 rounded-full bg-red-600 cursor-pointer border-2 border-transparent hover:border-white"></div>
                        <div onclick="setTheme('#16a34a')" class="w-8 h-8 rounded-full bg-green-600 cursor-pointer border-2 border-transparent hover:border-white"></div>
                        <div onclick="setTheme('#ffffff')" class="w-8 h-8 rounded-full bg-white cursor-pointer border-2 border-transparent hover:border-black"></div>
                    </div>
                </div>
            </div>
            <button onclick="toggleModal('settingsModal')" class="w-full mt-8 py-2 text-gray-500 font-bold uppercase text-xs tracking-widest">Закрыть</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let rates = { RUB: 94.2, UAH: 39.5, USD: 1.0 };
        let activeColor = '#2563eb';

        function toggleModal(id) {
            document.getElementById(id).classList.toggle('active-modal');
        }

        function copyAddr() {
            navigator.clipboard.writeText("UQCE0zJ-0FFfY0nPUUkVIPUVBhm3K9O0ugJaErpH1uNTa-T9");
            alert("Адрес скопирован!");
        }

        function setTheme(color) {
            activeColor = color;
            document.querySelectorAll('.bg-blue-600').forEach(el => el.style.backgroundColor = color);
            document.getElementById('brandLogo').style.backgroundColor = color;
            document.getElementById('currencyLabel').style.color = color;
            // Обводки кнопок тем
            document.querySelectorAll('.rounded-full.border-2').forEach(el => el.style.borderColor = 'transparent');
            event.target.style.borderColor = 'white';
        }

        function applySettings() {
            const amount = document.getElementById('fakeInp').value || 0;
            const currency = document.getElementById('currSel').value;
            
            document.getElementById('balanceValue').innerText = Number(amount).toLocaleString();
            document.getElementById('listBalance').innerText = Number(amount).toLocaleString();
            
            const secondary = amount * rates[currency];
            document.getElementById('secondaryBalance').innerText = `≈ ${secondary.toLocaleString()} ${currency}`;
            
            toggleModal('settingsModal');
        }
    </script>
</body>
</html>
